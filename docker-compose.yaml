version: '3.9'

services:
  db:
    container_name: db
    image: postgres:12
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: 
      context: .
      dockerfile: Dockerfile # The one in your root for Django
    command: /startdjango
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend          
      dockerfile: Dockerfile
    container_name: cloudstorm_ui
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app            
      - /app/node_modules           
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy 
    restart: unless-stopped

  celery:
    build: 
      context: .
      dockerfile: Dockerfile
    command: /startceleryworker
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data: