repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.17
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args:
          - -r
          - ./apps
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        # Only run on frontend files
        files: ^frontend/
        types_arr: [javascript, typescript, jsx, tsx, json, css, scss, html]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.0
    hooks:
      - id: eslint
        files: ^cloudstorm-frontend/
        types_arr: [javascript, typescript, jsx, tsx]
        args: [--fix, --max-warnings, "0"]
        # Ensure it uses your frontend's config
        additional_dependencies:
          - eslint@8.57.0
          - typescript@5.4.2
          - "@typescript-eslint/parser"
          - "@typescript-eslint/eslint-plugin"

  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript Check
        entry: bash -c "cd cloudstorm-frontend && npm run type-check"
        language: system
        files: ^frontend/
        pass_filenames: false